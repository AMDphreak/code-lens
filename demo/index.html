<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>code-lens</title>
    <meta
      name="description"
      content="One snippet, multiple pedagogical naming conventions — the real lens for code examples."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans&family=Space+Grotesk:wght@400;600&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var key = "code-lens-color-scheme";
        var pref = localStorage.getItem(key) || "auto";
        var dark =
          pref === "dark" ||
          (pref === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
        document.documentElement.dataset.colorScheme = pref;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
